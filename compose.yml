services:
  worker:
    build: .
    container_name: cc-${PROJECT_NAME:-cc}
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - .docker-claude/config:/home/cc-worker/.claude
      - .docker-claude/claude.json:/home/cc-worker/.claude.json
    env_file:
      - path: .env
        required: false
    environment:
      - ANTHROPIC_API_KEY
      - MODEL
      - EFFORT
      - TIMEOUT
      - GIT_USER_NAME
      - GIT_USER_EMAIL
